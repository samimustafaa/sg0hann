    <!-- floating music widget -->
    <div id="music-widget" style="opacity:0;pointer-events:none;transition:opacity 0.6s ease;">
        <div id="music-panel">
            <div class="player-title">Now Playing</div>
            <div class="player-track">School rooftop</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:-10px;margin-bottom:10px;">Hisohkah</div>
            <audio id="audioEl" src="Hisohkah - School rooftop (SlowedReverb).mp3" preload="metadata"></audio>
            <div class="player-controls">
                <button class="play-btn" id="playBtn" aria-label="Play/Pause">
                    <svg viewBox="0 0 24 24" id="playIcon">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                </button>
                <div class="progress-wrap">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-row">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>
        <div id="music-fab">
            <svg viewBox="0 0 24 24">
                <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" />
            </svg>
            <div class="eq"><span></span><span></span><span></span><span></span></div>
        </div>
    </div>

    <script>
        const NAMESPACE = 'sg0hann_everything_v5';
        const ABACUS_BASE = 'https://abacus.jasoncameron.dev';

        /* ── particles + trail — single unified RAF loop ── */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const trailCanvas = document.getElementById('trail-canvas');
        const tCtx = trailCanvas.getContext('2d');
        let W, H;

        function resizeAll() {
            W = canvas.width = trailCanvas.width = window.innerWidth;
            H = canvas.height = trailCanvas.height = window.innerHeight;
        }
        resizeAll();
        window.addEventListener('resize', () => { resizeAll(); initParticles(); });

        /* particles — reduced count, no per-particle fillStyle string build */
        let particles = [];
        function initParticles() {
            particles = Array.from({ length: 30 }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 1.2 + 0.3,
                dx: (Math.random() - 0.5) * 0.2, dy: (Math.random() - 0.5) * 0.2,
                a: Math.random() * 0.35 + 0.08,
            }));
        }
        initParticles();

        /* cursor */
        const dot = document.getElementById('cursor-dot');
        let mouseX = -200, mouseY = -200;
        let lerpX = -200, lerpY = -200;

        document.addEventListener('mousemove', function (e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            dot.style.left = mouseX + 'px';
            dot.style.top = mouseY + 'px';
        });

        /* trail */
        const TRAIL_LEN = 22;
        const trail = [];

        /* single loop */
        function loop() {
            /* — particles — */
            ctx.clearRect(0, 0, W, H);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(91,155,213,${p.a})`;
                ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if (p.x < 0 || p.x > W) p.dx *= -1;
                if (p.y < 0 || p.y > H) p.dy *= -1;
            }

            /* — trail lerp — */
            lerpX += (mouseX - lerpX) * 0.2;
            lerpY += (mouseY - lerpY) * 0.2;
            trail.push({ x: lerpX, y: lerpY });
            if (trail.length > TRAIL_LEN) trail.shift();

            /* — trail draw — single path, one stroke, no per-segment shadowBlur — */
            tCtx.clearRect(0, 0, W, H);
            if (trail.length > 3) {
                tCtx.save();
                tCtx.shadowColor = 'rgba(168,85,247,0.55)';
                tCtx.shadowBlur = 10;
                tCtx.beginPath();
                tCtx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length - 1; i++) {
                    const mx = (trail[i].x + trail[i + 1].x) / 2;
                    const my = (trail[i].y + trail[i + 1].y) / 2;
                    tCtx.quadraticCurveTo(trail[i].x, trail[i].y, mx, my);
                }
                tCtx.lineTo(trail[trail.length - 1].x, trail[trail.length - 1].y);
                const g = tCtx.createLinearGradient(trail[0].x, trail[0].y, trail[trail.length - 1].x, trail[trail.length - 1].y);
                g.addColorStop(0, 'rgba(168,85,247,0)');
                g.addColorStop(1, 'rgba(200,100,255,0.9)');
                tCtx.strokeStyle = g;
                tCtx.lineWidth = 2.5;
                tCtx.lineCap = 'round';
                tCtx.lineJoin = 'round';
                tCtx.stroke();
                tCtx.restore();
            }

            requestAnimationFrame(loop);
        }
        loop();

        /* ── splash ── */
        const splash = document.getElementById('splash');
        const main = document.getElementById('main');
        const musicWidget = document.getElementById('music-widget');

        splash.addEventListener('click', () => {
            splash.classList.add('hidden');
            setTimeout(() => {
                splash.style.display = 'none';
                main.classList.add('visible');
                musicWidget.style.opacity = '1';
                musicWidget.style.pointerEvents = 'all';
                /* autoplay on enter */
                const audio = document.getElementById('audioEl');
                audio.play().then(() => {
                    document.getElementById('playIcon').querySelector('path').setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
                    document.getElementById('music-fab').classList.add('playing');
                }).catch(() => { });
            }, 600);
        });

        /* ── visitors — real-time all-time total ── */
        async function initViews() {
            const totalHitUrl = `${ABACUS_BASE}/hit/${NAMESPACE}/total-visits`;
            const totalGetUrl = `${ABACUS_BASE}/get/${NAMESPACE}/total-visits`;
            const totalStreamUrl = `${ABACUS_BASE}/stream/${NAMESPACE}/total-visits`;

            function setTotalVisitors(value) {
                const formatted = Number(value ?? 0).toLocaleString();
                document.getElementById('viewCount').textContent = formatted;
                document.getElementById('visCount').textContent = formatted;
            }

            try {
                const totalRes = await fetch(totalHitUrl, { cache: 'no-store' });
                if (!totalRes.ok) throw new Error('total views increment failed');
                const totalData = await totalRes.json();
                const totalCount = Number(totalData?.value ?? 0);
                setTotalVisitors(totalCount);
            } catch (_) {
                try {
                    const totalFallbackRes = await fetch(totalGetUrl, { cache: 'no-store' });
                    if (!totalFallbackRes.ok) throw new Error('total views read failed');
                    const totalFallbackData = await totalFallbackRes.json();
                    const totalFallbackCount = Number(totalFallbackData?.value ?? 0);
                    setTotalVisitors(totalFallbackCount);
                } catch (_) {
                    document.getElementById('viewCount').textContent = '—';
                    document.getElementById('visCount').textContent = '—';
                }
            }

            try {
                const source = new EventSource(totalStreamUrl);
                source.onmessage = (event) => {
                    try {
                        const payload = JSON.parse(event.data);
                        const value = Number(payload?.value ?? 0);
                        setTotalVisitors(value);
                    } catch (_) {
                        // ignore malformed stream payloads
                    }
                };
            } catch (_) {
                // stream is optional; initial fetched value is still shown
            }
        }

        async function initLikes() {
            const countEl = document.getElementById('likeCount');
            if (!countEl) return;

            try {
                const res = await fetch(`${ABACUS_BASE}/get/${NAMESPACE}/likes`, { cache: 'no-store' });
                if (!res.ok) throw new Error('likes fetch failed');
                const data = await res.json();
                const value = Number(data?.value ?? 0);
                countEl.innerText = String(value);
                localStorage.setItem('local_likes', String(value));
            } catch (_) {
                countEl.innerText = localStorage.getItem('local_likes') || '0';
            }
        }

        async function likeOnce() {
            const likeBtn = document.getElementById('likeBtn');
            const countEl = document.getElementById('likeCount');
            if (!likeBtn || !countEl) return;

            const dailyKey = `${NAMESPACE}_liked_date`;
            const today = new Date().toISOString().slice(0, 10);
            if (localStorage.getItem(dailyKey) === today) {
                likeBtn.disabled = true;
                likeBtn.textContent = 'Liked';
                return;
            }

            likeBtn.disabled = true;
            likeBtn.textContent = 'Liking...';

            try {
                const res = await fetch(`${ABACUS_BASE}/hit/${NAMESPACE}/likes`, { cache: 'no-store' });
                if (!res.ok) throw new Error('like increment failed');
                const data = await res.json();
                const value = Number(data?.value ?? 0);
                countEl.innerText = String(value);
                localStorage.setItem('local_likes', String(value));
                localStorage.setItem(dailyKey, today);
                likeBtn.textContent = 'Liked';
            } catch (_) {
                likeBtn.disabled = false;
                likeBtn.textContent = 'Like';
            }
        }

        function bindLikeButton() {
            const likeBtn = document.getElementById('likeBtn');
            if (!likeBtn) return;

            const dailyKey = `${NAMESPACE}_liked_date`;
            const today = new Date().toISOString().slice(0, 10);
            if (localStorage.getItem(dailyKey) === today) {
                likeBtn.disabled = true;
                likeBtn.textContent = 'Liked';
            }

            likeBtn.addEventListener('click', likeOnce);
        }

        if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            initViews();
        } else {
            document.getElementById('viewCount').textContent = 'dev';
            document.getElementById('visCount').textContent = 'dev';
        }
        initLikes();
        bindLikeButton();

        /* ── music player ── */
        const audio = document.getElementById('audioEl');
        const playBtn = document.getElementById('playBtn');
        const playIconEl = document.getElementById('playIcon');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const fab = document.getElementById('music-fab');

        const PAUSE_PATH = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
        const PLAY_PATH = 'M8 5v14l11-7z';

        function fmt(s) { return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`; }

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = fmt(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            currentTimeEl.textContent = fmt(audio.currentTime);
        });

        audio.addEventListener('ended', () => {
            playIconEl.querySelector('path').setAttribute('d', PLAY_PATH);
            fab.classList.remove('playing');
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIconEl.querySelector('path').setAttribute('d', PAUSE_PATH);
                fab.classList.add('playing');
            } else {
                audio.pause();
                playIconEl.querySelector('path').setAttribute('d', PLAY_PATH);
                fab.classList.remove('playing');
            }
        });

        const progressBar = document.getElementById('progressBar');
        let scrubbing = false;

        function scrubTo(e) {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            audio.currentTime = pct * audio.duration;
        }

        progressBar.addEventListener('mousedown', e => { scrubbing = true; scrubTo(e); });
        window.addEventListener('mousemove', e => { if (scrubbing) scrubTo(e); });
        window.addEventListener('mouseup', () => { scrubbing = false; });

        /* open panel only when hovering the fab icon */
        const musicPanel = document.getElementById('music-panel');
        const musicFab = document.getElementById('music-fab');
        let panelTimer;

        function openPanel() { clearTimeout(panelTimer); musicPanel.classList.add('open'); }
        function closePanel() { panelTimer = setTimeout(() => musicPanel.classList.remove('open'), 150); }

        musicFab.addEventListener('mouseenter', openPanel);
        musicFab.addEventListener('mouseleave', closePanel);
        musicPanel.addEventListener('mouseenter', openPanel);
        musicPanel.addEventListener('mouseleave', closePanel);
    </script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        /* run after splash is dismissed */
        const _origSplashClick = splash.onclick;
        document.getElementById('splash').addEventListener('click', () => {
            setTimeout(() => {
                gsap.from('.char', {
                    duration: 0.6,
                    y: -40,
                    opacity: 0,
                    stagger: 0.07,
                    ease: 'back.out(1.7)'
                });
            }, 650);
        });

        /* hover: each letter bounces on mouseenter */
        document.querySelectorAll('.char').forEach(char => {
            char.addEventListener('mouseenter', () => {
                gsap.killTweensOf(char);
                gsap.timeline()
                    .to(char, { y: -12, scale: 1.3, duration: 0.18, ease: 'power2.out' })
                    .to(char, { y: 0, scale: 1.0, duration: 0.4, ease: 'elastic.out(1, 0.4)' });
            });
        });
    </script>
